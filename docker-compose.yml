services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aged_fullstack_template}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/redis-data:/data

  api:
    build:
      context: ./backend
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-aged-fullstack-template}
      API_PORT: 3000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aged_fullstack_template}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-5173}:80"
