services:
  api:
    build:
      context: ./backend
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-aged-fullstack-template}
      API_PORT: 3000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aged_fullstack_template}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:${API_PORT:-3000}/api
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  nginx:
    profiles: ["disabled"]
