services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://api:3000/api
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  nginx:
    profiles: ["disabled"]
